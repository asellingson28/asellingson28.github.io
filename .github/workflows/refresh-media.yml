name: Refresh media data

# Daily snapshot of the Goodreads/Letterboxd RSS feeds into src/data/.
# A push made with GITHUB_TOKEN doesn't trigger other push workflows, so this
# dispatches deploy.yml explicitly after committing.
on:
  schedule:
    - cron: '17 9 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: refresh-media
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/fetch-media.mjs
      - name: Commit and deploy if changed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if git diff --quiet -- src/data/goodreads.json src/data/letterboxd.json; then
            echo "No media changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/goodreads.json src/data/letterboxd.json
          git commit -m "data: refresh goodreads/letterboxd snapshots"
          git push
          gh workflow run deploy.yml --ref main
