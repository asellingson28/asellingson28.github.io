name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      notify_file:
        description: 'Test the email step: blog file path (e.g. src/content/blog/test-blog.md). Leave blank to skip.'
        type: string
        default: ''
      notify_dry_run:
        description: 'Dry run (log what would be emailed, but do not actually send)'
        type: boolean
        default: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  notify-blog-subscribers:
    needs: deploy
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.notify_file != '')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - name: Email newly published blog posts
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          MAIL_REPLY_TO: ${{ secrets.MAIL_REPLY_TO }}
          MAIL_SUBSCRIBERS: ${{ secrets.MAIL_SUBSCRIBERS }}
          MAIL_UNSUBSCRIBE: ${{ secrets.MAIL_UNSUBSCRIBE }}
          WORKER_URL: ${{ vars.WORKER_URL }}
          SYNC_SECRET: ${{ secrets.SYNC_SECRET }}
          SITE_URL: https://asellingson28.github.io
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            npm run notify:blog -- "${{ github.event.inputs.notify_file }}" ${{ github.event.inputs.notify_dry_run == 'true' && '--dry-run' || '' }}
          else
            npm run notify:blog -- --since "${{ github.event.before }}"
          fi
